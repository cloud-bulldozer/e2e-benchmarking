namespace: "fio-test"
workload:
  name: "fio"
  args:
    kind: "pod"
    servers: 3
    samples: 2
    jobs: ["read", "write", "randwrite"]
    bs: ["4KiB", "16KiB"]
    numjobs: [1]
    iodepth: 4
    filesize: "1G"
    read_runtime: 60
    read_ramp_time: 10
    write_runtime: 60
    write_ramp_time: 10
    prefill: true
    prefill_bs: "1024KiB"
    post_prefill_sleep: 30
    image: "quay.io/jtaleric/fio:latest"

job_params:
  - jobname_match: write
    params:
      - time_based=1
      - fsync_on_close=1
      - create_on_open=1
  - jobname_match: read
    params:
      - time_based=1
  - jobname_match: randwrite
    params:
      - time_based=1
      - fsync_on_close=1
      - create_on_open=1

elasticsearch:
  url: "${ES_SERVER}"
  index_name: "${ES_INDEX}"
  verify_cert: false
  parallel: true
